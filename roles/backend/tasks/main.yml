---
- name: Install Docker
  apt:
    name: docker.io
    state: present
    update_cache: yes

- name: Start Docker Service
  systemd:
    name: docker
    state: started
    enabled: yes

- name: Run Database Container
  docker_container:
    name: db
    image: your_db_image
    state: started
    env:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: db_name
      MYSQL_USER: db_user
      MYSQL_PASSWORD: db_password
